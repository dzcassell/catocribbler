# Merge this route into the existing Cribl Worker Group route.yml and replace
# cato_file_output with the customer's validation or production Destination.
# The filter intentionally accepts any Cribl Syslog Source ID and then narrows
# on the RFC 5424 appname emitted by this poller.
- id: cato_events_route
  name: cato_events_route
  final: true
  disabled: false
  pipeline: cato_normalize
  description: "Route Cato EventsFeed syslog records through normalization"
  enableOutputExpression: false
  filter: "__inputId.startsWith('syslog:') && appname === 'cato-events'"
  clones: []
  output: cato_file_output
